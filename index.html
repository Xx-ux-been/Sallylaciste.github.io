<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Wallet</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#eef1f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.phone{
width:360px;
background:white;
border-radius:25px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
overflow:hidden;
}

.header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.balance{
font-size:36px;
font-weight:bold;
margin-top:10px;
}

.actions{
display:flex;
justify-content:space-around;
padding:20px;
}

.btn{
background:#f4f6f9;
padding:15px;
border-radius:12px;
width:80px;
text-align:center;
}

.demo{
text-align:center;
font-size:12px;
color:red;
padding:10px;
}
</style>

</head>

<body>

<div class="phone">

<div class="header">
<h3>Demo Wallet</h3>
<p>Available Balance</p>
<div class="balance">₱431,000</div>
</div>

<div class="actions">
<div class="btn">Send</div>
<div class="btn">Receive</div>
<div class="btn">History</div>
</div>

<div class="demo">
Sample UI – Not a real wallet
</div>

</div>

</body>
</html>
